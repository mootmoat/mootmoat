<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="'Courier New', Courier, monospace">

  <!-- Background -->
  <rect width="1400" height="900" fill="#0d1117"/>

  <!-- Top header band -->
  <rect width="1400" height="64" fill="#111820"/>
  <rect width="1400" height="2" y="64" fill="#c45e1a"/>

  <!-- Header text -->
  <text x="700" y="22" text-anchor="middle" fill="#e8d5c0" font-size="11" letter-spacing="4" font-weight="normal">MOOT MOAT · OPEN STANDARD FOR AGENTIC PROFESSIONAL IDENTITY</text>
  <text x="700" y="50" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="bold" letter-spacing="2">THE DEPTH SIGNAL TAXONOMY &amp; v17 FRONTIER</text>

  <!-- Version strip -->
  <rect width="1400" height="22" y="66" fill="#0a0f14"/>
  <text x="700" y="81" text-anchor="middle" fill="#556270" font-size="10" letter-spacing="3">MOOTMOAT.COM/VOCAB/V1 · V17.0 · FEBRUARY 2026 · MIT LICENSE · GITHUB.COM/MOOTMOAT</text>

  <!-- ======== LEFT PANEL: 12 DEPTH SIGNALS ======== -->

  <!-- Left panel background -->
  <rect x="20" y="100" width="840" height="755" rx="4" fill="#111820"/>
  <rect x="20" y="100" width="840" height="2" fill="#c45e1a"/>

  <!-- Left panel header -->
  <text x="40" y="124" fill="#c45e1a" font-size="10" letter-spacing="3" font-weight="bold">THE TWELVE DEPTH SIGNALS</text>
  <text x="40" y="142" fill="#8a9bb0" font-size="10" letter-spacing="2">TECHNIQUE TAXONOMY · THE SOURCE → MACHINE-READABLE IDENTITY</text>

  <!-- Column headers -->
  <rect x="20" y="150" width="840" height="1" fill="#1e2d3d"/>
  <text x="40" y="167" fill="#556270" font-size="9" letter-spacing="2">#</text>
  <text x="70" y="167" fill="#556270" font-size="9" letter-spacing="2">TECHNIQUE</text>
  <text x="310" y="167" fill="#556270" font-size="9" letter-spacing="2">WHAT IT REVEALS</text>
  <text x="590" y="167" fill="#556270" font-size="9" letter-spacing="2">THE UNFAKEABLE ELEMENT</text>
  <rect x="20" y="172" width="840" height="1" fill="#1e2d3d"/>

  <!-- Signal rows - alternating background -->
  <!-- Row 1 -->
  <rect x="20" y="173" width="840" height="51" fill="#0d1117"/>
  <text x="40" y="191" fill="#c45e1a" font-size="11" font-weight="bold">01</text>
  <text x="70" y="191" fill="#e8d5c0" font-size="11" font-weight="bold">Provenance Chain</text>
  <text x="70" y="207" fill="#556270" font-size="9">The flagship workbook entry point.</text>
  <text x="310" y="191" fill="#8a9bb0" font-size="10">Accumulated failure depth</text>
  <text x="590" y="191" fill="#8a9bb0" font-size="10">The full lineage, not just the</text>
  <text x="590" y="204" fill="#8a9bb0" font-size="10">current solution</text>
  <rect x="20" y="224" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 2 -->
  <rect x="20" y="225" width="840" height="51" fill="#111820"/>
  <text x="40" y="243" fill="#c45e1a" font-size="11" font-weight="bold">02</text>
  <text x="70" y="243" fill="#e8d5c0" font-size="11" font-weight="bold">Structural Rhyme</text>
  <text x="70" y="259" fill="#556270" font-size="9">Flagship schema technique → isomorphicProof block.</text>
  <text x="310" y="243" fill="#8a9bb0" font-size="10">Cross-domain cognitive architecture</text>
  <text x="590" y="243" fill="#8a9bb0" font-size="10">The shared failure mode at depth</text>
  <rect x="20" y="276" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 3 -->
  <rect x="20" y="277" width="840" height="51" fill="#0d1117"/>
  <text x="40" y="295" fill="#c45e1a" font-size="11" font-weight="bold">03</text>
  <text x="70" y="295" fill="#e8d5c0" font-size="11" font-weight="bold">Forensic Number</text>
  <text x="70" y="311" fill="#556270" font-size="9">75°C → 22.6°C. Round numbers are estimates. Jagged numbers are real.</text>
  <text x="310" y="295" fill="#8a9bb0" font-size="10">Measurement precision</text>
  <text x="590" y="295" fill="#8a9bb0" font-size="10">The jagged specificity of instruments</text>
  <rect x="20" y="328" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 4 -->
  <rect x="20" y="329" width="840" height="51" fill="#111820"/>
  <text x="40" y="347" fill="#c45e1a" font-size="11" font-weight="bold">04</text>
  <text x="70" y="347" fill="#e8d5c0" font-size="11" font-weight="bold">Compressed War Story</text>
  <text x="70" y="363" fill="#556270" font-size="9">One sentence. Expands on contact. Compression requires mastery.</text>
  <text x="310" y="347" fill="#8a9bb0" font-size="10">Mastery of narrative compression</text>
  <text x="590" y="347" fill="#8a9bb0" font-size="10">The essential sentence after iteration</text>
  <rect x="20" y="380" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 5 -->
  <rect x="20" y="381" width="840" height="51" fill="#0d1117"/>
  <text x="40" y="399" fill="#c45e1a" font-size="11" font-weight="bold">05</text>
  <text x="70" y="399" fill="#e8d5c0" font-size="11" font-weight="bold">Constraint Personality</text>
  <text x="70" y="415" fill="#556270" font-size="9">"Thermal is patient. EMI is a liar." Character formed by encounter.</text>
  <text x="310" y="399" fill="#8a9bb0" font-size="10">Relationship with a physical domain</text>
  <text x="590" y="399" fill="#8a9bb0" font-size="10">The character formed by specific</text>
  <text x="590" y="412" fill="#8a9bb0" font-size="10">encounters</text>
  <rect x="20" y="432" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 6 -->
  <rect x="20" y="433" width="840" height="51" fill="#111820"/>
  <text x="40" y="451" fill="#c45e1a" font-size="11" font-weight="bold">06</text>
  <text x="70" y="451" fill="#e8d5c0" font-size="11" font-weight="bold">Decision Heuristic</text>
  <text x="70" y="467" fill="#556270" font-size="9">Not from a textbook. Crystallized from a specific class of failure.</text>
  <text x="310" y="451" fill="#8a9bb0" font-size="10">Failure-derived rule making</text>
  <text x="590" y="451" fill="#8a9bb0" font-size="10">The specific exception clause</text>
  <rect x="20" y="484" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 7 -->
  <rect x="20" y="485" width="840" height="51" fill="#0d1117"/>
  <text x="40" y="503" fill="#c45e1a" font-size="11" font-weight="bold">07</text>
  <text x="70" y="503" fill="#e8d5c0" font-size="11" font-weight="bold">Counterfactual</text>
  <text x="70" y="519" fill="#556270" font-size="9">Name the catastrophe that didn't happen. Name the threshold. The magnitude.</text>
  <text x="310" y="503" fill="#8a9bb0" font-size="10">Failure prevention depth</text>
  <text x="590" y="503" fill="#8a9bb0" font-size="10">The named consequence magnitude</text>
  <rect x="20" y="536" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 8 -->
  <rect x="20" y="537" width="840" height="51" fill="#111820"/>
  <text x="40" y="555" fill="#c45e1a" font-size="11" font-weight="bold">08</text>
  <text x="70" y="555" fill="#e8d5c0" font-size="11" font-weight="bold">Threshold Vocabulary</text>
  <text x="70" y="571" fill="#556270" font-size="9">"The comfortable lie." Language coined under pressure. No textbook equivalent.</text>
  <text x="310" y="555" fill="#8a9bb0" font-size="10">Private language for near-failure</text>
  <text x="590" y="555" fill="#8a9bb0" font-size="10">Vocabulary coined under pressure</text>
  <rect x="20" y="588" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 9 -->
  <rect x="20" y="589" width="840" height="51" fill="#0d1117"/>
  <text x="40" y="607" fill="#c45e1a" font-size="11" font-weight="bold">09</text>
  <text x="70" y="607" fill="#e8d5c0" font-size="11" font-weight="bold">Tool as Character</text>
  <text x="70" y="623" fill="#556270" font-size="9">The Excel calculator at 3am, not FEA. Trust calibrated under real stakes.</text>
  <text x="310" y="607" fill="#8a9bb0" font-size="10">Epistemic style under crisis</text>
  <text x="590" y="607" fill="#8a9bb0" font-size="10">Trust calibrated by real-stakes</text>
  <text x="590" y="620" fill="#8a9bb0" font-size="10">experience</text>
  <rect x="20" y="640" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 10 -->
  <rect x="20" y="641" width="840" height="51" fill="#111820"/>
  <text x="40" y="659" fill="#c45e1a" font-size="11" font-weight="bold">10</text>
  <text x="70" y="659" fill="#e8d5c0" font-size="11" font-weight="bold">Negative Space Expertise</text>
  <text x="70" y="675" fill="#556270" font-size="9">Every "never" encodes a failure. The condition clause is the fingerprint.</text>
  <text x="310" y="659" fill="#8a9bb0" font-size="10">Prohibition-encoded failure history</text>
  <text x="590" y="659" fill="#8a9bb0" font-size="10">Contextual conditions on each rule</text>
  <rect x="20" y="692" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 11 -->
  <rect x="20" y="693" width="840" height="51" fill="#0d1117"/>
  <text x="40" y="711" fill="#c45e1a" font-size="11" font-weight="bold">11</text>
  <text x="70" y="711" fill="#e8d5c0" font-size="11" font-weight="bold">Temporal Signature</text>
  <text x="70" y="727" fill="#556270" font-size="9">When you engage. Early intervention reveals your model of how failures develop.</text>
  <text x="310" y="711" fill="#8a9bb0" font-size="10">Mental model of failure development</text>
  <text x="590" y="711" fill="#8a9bb0" font-size="10">The stage-specific intervention timing</text>
  <rect x="20" y="744" width="840" height="1" fill="#1e2d3d"/>

  <!-- Row 12 -->
  <rect x="20" y="745" width="840" height="51" fill="#111820"/>
  <text x="40" y="763" fill="#c45e1a" font-size="11" font-weight="bold">12</text>
  <text x="70" y="763" fill="#e8d5c0" font-size="11" font-weight="bold">Mentor Echo</text>
  <text x="70" y="779" fill="#556270" font-size="9">"If you can't draw the heat path..." A living transmission. Voice, not lesson.</text>
  <text x="310" y="763" fill="#8a9bb0" font-size="10">Transmitted cognitive architecture</text>
  <text x="590" y="763" fill="#8a9bb0" font-size="10">The voice and the moment of</text>
  <text x="590" y="776" fill="#8a9bb0" font-size="10">understanding</text>
  <rect x="20" y="796" width="840" height="1" fill="#1e2d3d"/>

  <!-- Left panel footer note -->
  <text x="40" y="820" fill="#556270" font-size="9" letter-spacing="1">THE BET IS THE SAME FOR ALL TWELVE: SPECIFICITY AT DEPTH COMMUNICATES COGNITIVE ARCHITECTURE THAT GENERIC CONTENT CANNOT REPLICATE.</text>
  <text x="40" y="838" fill="#556270" font-size="9" letter-spacing="1">START WITH THE WORKBOOK. PICK THE TECHNIQUE THAT MATCHES YOUR STRONGEST MATERIAL. ONE CANVAS IS THE NUCLEUS.</text>

  <!-- ======== RIGHT PANEL: v17 FRONTIER ======== -->

  <!-- Right panel background -->
  <rect x="876" y="100" width="504" height="590" rx="4" fill="#111820"/>
  <rect x="876" y="100" width="504" height="2" fill="#c45e1a"/>

  <!-- Right panel header -->
  <text x="896" y="124" fill="#c45e1a" font-size="10" letter-spacing="3" font-weight="bold">THE v17 FRONTIER</text>
  <text x="896" y="142" fill="#8a9bb0" font-size="10" letter-spacing="2">ARCHITECTURAL GAPS · ACTIVE MEASUREMENT VECTORS</text>
  <rect x="876" y="150" width="504" height="1" fill="#1e2d3d"/>

  <!-- Vector 1: Reverse Radar -->
  <rect x="876" y="152" width="504" height="130" fill="#0d1117"/>
  <rect x="896" y="168" width="3" height="90" fill="#c45e1a"/>

  <!-- Status badge - ACTIVE -->
  <rect x="1300" y="162" width="68" height="18" rx="3" fill="#1a3a1a"/>
  <text x="1334" y="174" text-anchor="middle" fill="#4caf50" font-size="9" letter-spacing="1" font-weight="bold">● ACTIVE</text>

  <text x="910" y="178" fill="#e8d5c0" font-size="13" font-weight="bold">Reverse Radar</text>
  <text x="910" y="196" fill="#8a9bb0" font-size="10">The Empirical Gap. We do not guess how AI screening agents weight</text>
  <text x="910" y="210" fill="#8a9bb0" font-size="10">structured constraint data versus keyword density. We measure it.</text>
  <text x="910" y="228" fill="#556270" font-size="9">Deploying structured data across sovereign domains generates behavioral</text>
  <text x="910" y="241" fill="#556270" font-size="9">telemetry in the wild. Market intelligence, not assumptions.</text>
  <rect x="876" y="282" width="504" height="1" fill="#1e2d3d"/>

  <!-- Vector 2: Authenticated Endpoints -->
  <rect x="876" y="283" width="504" height="130" fill="#111820"/>
  <rect x="896" y="299" width="3" height="90" fill="#c45e1a"/>

  <!-- Status badge - GAP -->
  <rect x="1300" y="293" width="68" height="18" rx="3" fill="#2a1a0a"/>
  <text x="1334" y="305" text-anchor="middle" fill="#c45e1a" font-size="9" letter-spacing="1" font-weight="bold">▲ GAP</text>

  <text x="910" y="309" fill="#e8d5c0" font-size="13" font-weight="bold">Authenticated Endpoints</text>
  <text x="910" y="327" fill="#8a9bb0" font-size="10">The Compliance Gap. ITAR-adjacent constraint data cannot currently be</text>
  <text x="910" y="341" fill="#8a9bb0" font-size="10">routed securely to cleared reviewers through the public schema.</text>
  <text x="910" y="359" fill="#556270" font-size="9">Future vector: encrypted JSON-LD payloads or zero-knowledge proofs.</text>
  <text x="910" y="372" fill="#556270" font-size="9">The air-gap is not optional. This gap is identified and named; not yet solved.</text>
  <rect x="876" y="413" width="504" height="1" fill="#1e2d3d"/>

  <!-- Vector 3: Collaborative Graph Richness -->
  <rect x="876" y="414" width="504" height="130" fill="#0d1117"/>
  <rect x="896" y="430" width="3" height="90" fill="#445566"/>

  <!-- Status badge - RESEARCH -->
  <rect x="1284" y="424" width="84" height="18" rx="3" fill="#1a1a2a"/>
  <text x="1326" y="436" text-anchor="middle" fill="#7788aa" font-size="9" letter-spacing="1" font-weight="bold">◇ RESEARCH</text>

  <text x="910" y="440" fill="#8a9bb0" font-size="13" font-weight="bold">Collaborative Graph Richness</text>
  <text x="910" y="458" fill="#556270" font-size="10">Research direction under evaluation. Not a current protocol capability.</text>
  <text x="910" y="476" fill="#445566" font-size="9">Hypothesis: two engineers independently referencing the same constraint</text>
  <text x="910" y="489" fill="#445566" font-size="9">project with consistent metadata may create a multi-entity coherence signal.</text>
  <text x="910" y="502" fill="#445566" font-size="9">On the roadmap. No current deployment depends on it.</text>
  <rect x="876" y="544" width="504" height="1" fill="#1e2d3d"/>

  <!-- Vector 4: Taxonomy Governance -->
  <rect x="876" y="545" width="504" height="130" fill="#111820"/>
  <rect x="896" y="561" width="3" height="90" fill="#c45e1a"/>

  <!-- Status badge - ROADMAP -->
  <rect x="1290" y="555" width="78" height="18" rx="3" fill="#1a1a0a"/>
  <text x="1329" y="567" text-anchor="middle" fill="#8a8a40" font-size="9" letter-spacing="1" font-weight="bold">◉ ROADMAP</text>

  <text x="910" y="571" fill="#e8d5c0" font-size="13" font-weight="bold">Taxonomy Governance</text>
  <text x="910" y="589" fill="#8a9bb0" font-size="10">The Taxonomy Gap. Scaling constraint domains to photonics, MEMS,</text>
  <text x="910" y="603" fill="#8a9bb0" font-size="10">acoustics, and high-voltage requires a formal RFC process.</text>
  <text x="910" y="621" fill="#556270" font-size="9">Governance must defend the Provenance Principle: the LLM formalizes,</text>
  <text x="910" y="634" fill="#556270" font-size="9">it does not discover. New domains must be rooted in lived experience.</text>
  <rect x="876" y="690" width="504" height="1" fill="#1e2d3d"/>

  <!-- ======== RIGHT PANEL LOWER: TRI-NODE FOOTPRINT ======== -->
  <rect x="876" y="702" width="504" height="153" rx="4" fill="#0a0f14"/>
  <rect x="876" y="702" width="504" height="2" fill="#c45e1a"/>

  <text x="896" y="722" fill="#c45e1a" font-size="10" letter-spacing="3" font-weight="bold">THE TRI-NODE FOOTPRINT</text>
  <text x="896" y="738" fill="#8a9bb0" font-size="10">COHERENCE AS THE SIGNAL · NOT CRYPTOGRAPHIC PROOF</text>

  <!-- Three nodes -->
  <circle cx="960" cy="790" r="28" fill="none" stroke="#c45e1a" stroke-width="1.5"/>
  <text x="960" y="787" text-anchor="middle" fill="#e8d5c0" font-size="9" font-weight="bold">PERSONAL</text>
  <text x="960" y="799" text-anchor="middle" fill="#e8d5c0" font-size="9" font-weight="bold">DOMAIN</text>

  <circle cx="1128" cy="790" r="28" fill="none" stroke="#c45e1a" stroke-width="1.5"/>
  <text x="1128" y="787" text-anchor="middle" fill="#e8d5c0" font-size="9" font-weight="bold">GITHUB</text>
  <text x="1128" y="799" text-anchor="middle" fill="#e8d5c0" font-size="9" font-weight="bold">REPO</text>

  <circle cx="1044" cy="840" r="28" fill="none" stroke="#c45e1a" stroke-width="1.5"/>
  <text x="1044" y="837" text-anchor="middle" fill="#e8d5c0" font-size="9" font-weight="bold">LINKED</text>
  <text x="1044" y="849" text-anchor="middle" fill="#e8d5c0" font-size="9" font-weight="bold">IN</text>

  <!-- Connecting lines -->
  <line x1="988" y1="790" x2="1100" y2="790" stroke="#c45e1a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="975" y1="812" x2="1020" y2="820" stroke="#c45e1a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="1113" y1="812" x2="1068" y2="820" stroke="#c45e1a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Coherence label -->
  <text x="1280" y="780" text-anchor="middle" fill="#556270" font-size="9">Synchronized, hyper-specific</text>
  <text x="1280" y="793" text-anchor="middle" fill="#556270" font-size="9">Depth Signals across all three</text>
  <text x="1280" y="806" text-anchor="middle" fill="#556270" font-size="9">independent substrates.</text>
  <text x="1280" y="826" text-anchor="middle" fill="#8a9bb0" font-size="9">Bots don't maintain it.</text>
  <text x="1280" y="839" text-anchor="middle" fill="#8a9bb0" font-size="9">Humans do.</text>

  <!-- ======== BOTTOM STRIP ======== -->
  <rect x="0" y="862" width="1400" height="38" fill="#0a0f14"/>
  <rect x="0" y="862" width="1400" height="1" fill="#c45e1a"/>

  <!-- Left: Provenance Principle -->
  <text x="20" y="878" fill="#c45e1a" font-size="9" font-weight="bold" letter-spacing="1">⚡ THE PROVENANCE PRINCIPLE:</text>
  <text x="194" y="878" fill="#8a9bb0" font-size="9">The LLM formalizes, it does not discover. The architect writes from lived experience first. Schema enforcement is the LLM's role — not authorship.</text>

  <!-- Right: License -->
  <text x="1380" y="878" text-anchor="end" fill="#556270" font-size="9" letter-spacing="1">MIT LICENSE · YOU OWN YOUR ENTITY · THE SPEC IS THE WORK</text>
  <text x="1380" y="891" text-anchor="end" fill="#445566" font-size="9">MOOTMOAT.COM · GITHUB.COM/MOOTMOAT</text>

</svg>
